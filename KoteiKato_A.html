<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KoteiKato - 3D Sudoku-Style Game</title>
    <link rel="stylesheet" href="KoteiKato.css">
</head>
<body>
<header>
  <h1 class="page-title">KoteiKato</h1>
</header>

 <div id="controls">
    <button id="up" class="grid-btn">▲</button>
    <button id="left" class="grid-btn">◀</button>
    <button id="right" class="grid-btn">▶</button>
    <button id="down" class="grid-btn">▼</button>
    <button id="in" class="grid-btn" ></button>
    <button id="out" class="grid-btn" ></button>
     <p class="grid-label" style="grid-row: 4;">Move Elevator</p> <!-- Below -->
</div>

 <div id="num-controls">
    <button id="one" class="grid-btn-n">1</button>
    <button id="two" class="grid-btn-n">2</button>
    <button id="three" class="grid-btn-n">3</button>
    <button id="four" class="grid-btn-n">4</button>
    <button id="five" class="grid-btn-n" >5</button>
    <button id="del" class="grid-btn-n" ></button>
    <p class="grid-label" style="grid-row: 4;">Set Cell Content</p> <!-- Below -->
</div>


<section class="settings-wrapper">

<div class="container">
  <!-- Row 1 -->
  <label>Size:</label>
  <select id = "size-option">
      <option value = "4">4</option>
       <option value = "5">5</option>

  </select>

  <!-- Row 2 -->
  <label>Puzzle #:</label>
  <select id = "game-option">
      <option value = "0">1</option>
      <option value = "1">2</option>
      <option value = "2">3</option>
      <option value = "3">4</option>
      <option value = "4">5</option>
  </select>

</div>

<!-- Truly independent text -->
  <footer class="independent-info" style="width:260px; font-size:1rem">
           <hr style="border: 0; border-top: 1px solid #555; margin: 15px 0;">
    <p><span class="key">TO START:</span> &nbsp; Click & hold to rotate</p>
    <p> <span class="key">&clubs;</span> &nbsp; Invalid entries are ignored</p>
     <p> <span class="key">&clubs;</span> &nbsp; Mobile version arriving soon!</p>
 <p> <span class="key">&clubs;</span> &nbsp; STAY TUNED FOR UPDATES</p>
  </footer>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script src="KoteiKato.js"></script>
</body>
</html>
