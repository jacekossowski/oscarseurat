<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>KoteiKato - 3D Sudoku-Style Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/css/bootstrap-select.min.css">
    <link rel="stylesheet" href="KoteiKatoM.css">
</head>
<body>
    <div id="orientation-blocker">
  <div class="content">
    <div class="phone-icon"></div>
    <p>Please rotate your device to portrait</p>
  </div>
</div>

<div id="my_app">
<header>
    <h1 class="page-title">
      <img src="icons/icons8tiger50W.png" alt="Logo" style="height: 60px; vertical-align: middle; margin-right: -1px;">
     KoteiKato<span style="display: block; margin-top: 6px; color: white; font-size:24px;">UNIQUE SOLUTION PUZZLES</span></h1>
</header>

<div id="threejs-container"></div>



<section class="settings-wrapper">

</section>


    <div class="container">
  <!-- Row 1 -->
  <label>Size:</label>
  <select id = "size-option">
      <option value = "4" >&#129001; 4</option>
       <option value = "5">&#128999; 5</option>

  </select>

  <!-- Row 2 -->
  <label>Level:</label>

<div id="combo_box">
	     <select class="selectpicker" id="game-option" data-width="200px" data-size="auto">
	        <option id="opt1" value="0" data-content="<img style='width: 52px; height: 52px;' src='./icons/icons8butterfly48.png'><span style='display: inline-block; width: 15px; font-size: 25px;'>&nbsp;14 clues</span>"></option>
	        <option id="opt2" value="1" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8duck48black.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;12 clues</span>"></option>
	        <option id="opt3" value="2" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8koala50d.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;10 clues</span>"></option>
	        <option id="opt4" value="3" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8panda50.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;&nbsp;9 clues</span>"></option>
	        <option id="opt5" value="4" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8leopard50.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;&nbsp;8 clues</span>"></option>
	        <option id="opt6" value="5" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8tiger50.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;&nbsp;7 clues</span>"></option>
	        <option id="opt7" value="6" data-content="<img style='width:  52px; height:  52px;' src='./icons/icons8dinosaur50.png'><span style='display: inline-block; width: 15px;font-size: 25px;'>&nbsp;&nbsp;6 clues!</span>"></option>
	     </select>
	   </div>
  </div>

<div id="control-panel">
 <div id="controls">
    <button id="up" class="grid-btn">▲</button>
    <button id="left" class="grid-btn">&#x25C0;&#xFE0E;</button>
    <button id="right" class="grid-btn">&#x25B6;&#xFE0E;</button>
    <button id="down" class="grid-btn">▼</button>
    <button id="in" class="grid-btn" ></button>
    <button id="out" class="grid-btn" ></button>
     <p class="grid-label" style="grid-row: 4; font-size: 2rem;">Move Elevator</p> <!-- Below -->
</div>

 <div id="num-controls">
    <button id="one" class="grid-btn-n">1</button>
    <button id="two" class="grid-btn-n">2</button>
    <button id="three" class="grid-btn-n">3</button>
    <button id="four" class="grid-btn-n">4</button>
    <button id="five" class="grid-btn-n" >5</button>
    <button id="del" class="grid-btn-n" ></button>
    <p class="grid-label" style="grid-row: 3; font-size: 2rem">Set Cell Content</p> <!-- Below -->
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script src="KoteiKatoM.js"></script>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/js/bootstrap-select.min.js"></script>

<script>
  $(document).ready(function() {
    $('.selectpicker').selectpicker();
  });
</script>

</body>
</html>
